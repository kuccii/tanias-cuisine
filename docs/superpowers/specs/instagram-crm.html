<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram Content CRM — Tania's Cuisine & Lounge</title>
<style>
:root {
  --bg: #0d0d0d;
  --surface: #1a1a1a;
  --surface2: #222;
  --border: #333;
  --text: #e5e5e5;
  --text2: #999;
  --accent: #c4943d;
  --accent2: #8b6b2e;
  --green: #22c55e;
  --blue: #3b82f6;
  --amber: #c4943d;
  --gray: #6b7280;
  --red: #ef4444;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
}
/* Header */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header h1 {
  font-size: 18px;
  font-weight: 600;
  letter-spacing: -0.3px;
}
.header h1 span { color: var(--accent); }
.header-actions { display: flex; gap: 8px; align-items: center; }
.btn {
  padding: 8px 16px;
  border-radius: 6px;
  border: none;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all .15s;
  background: var(--surface2);
  color: var(--text);
}
.btn:hover { opacity: .85; }
.btn-primary { background: var(--accent); color: #111; }
.btn-primary:hover { background: var(--accent2); color: #fff; }
.btn-danger { background: var(--red); color: #fff; }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-ghost { background: transparent; color: var(--text2); }
.btn-ghost:hover { background: var(--surface2); color: var(--text); }
/* Stats Bar */
.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 12px;
  padding: 16px 24px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.stat-card {
  background: var(--surface2);
  border-radius: 8px;
  padding: 12px 16px;
  text-align: center;
}
.stat-card .num { font-size: 24px; font-weight: 700; }
.stat-card .label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; margin-top: 2px; }
.stat-card.gold .num { color: var(--accent); }
.stat-card.blue .num { color: var(--blue); }
.stat-card.green .num { color: var(--green); }
.stat-card.gray .num { color: var(--gray); }
/* Toolbar */
.toolbar {
  padding: 12px 24px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
}
.toolbar .view-toggle {
  display: flex;
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
}
.toolbar .view-toggle button {
  padding: 6px 14px;
  border: none;
  background: transparent;
  color: var(--text2);
  cursor: pointer;
  font-size: 12px;
  transition: all .15s;
}
.toolbar .view-toggle button.active { background: var(--accent); color: #111; font-weight: 600; }
.toolbar .view-toggle button:not(:last-child) { border-right: 1px solid var(--border); }
.toolbar select, .toolbar input {
  padding: 6px 10px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font-size: 12px;
  min-width: 100px;
}
.toolbar input[type="search"] { min-width: 180px; }
.toolbar .spacer { flex: 1; }
/* Content */
.content { padding: 16px 24px; }
/* Table View */
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
thead th {
  text-align: left;
  padding: 10px 12px;
  border-bottom: 2px solid var(--border);
  color: var(--text2);
  font-weight: 500;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: .5px;
  cursor: pointer;
  user-select: none;
  white-space: nowrap;
}
thead th:hover { color: var(--accent); }
thead th .sort-icon { margin-left: 4px; opacity: .5; }
tbody tr {
  border-bottom: 1px solid var(--border);
  transition: background .1s;
  cursor: pointer;
}
tbody tr:hover { background: var(--surface2); }
tbody td {
  padding: 10px 12px;
  vertical-align: middle;
}
.status-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 500;
}
.status-Idea { background: var(--gray); color: #fff; }
.status-Draft { background: var(--blue); color: #fff; }
.status-Scheduled { background: var(--amber); color: #111; }
.status-Posted { background: var(--green); color: #111; }
.status-Archived { background: var(--red); color: #fff; }
.type-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  background: var(--surface2);
  color: var(--text2);
  border: 1px solid var(--border);
}
.caption-preview {
  max-width: 300px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  color: var(--text2);
}
.actions-cell {
  white-space: nowrap;
}
.actions-cell button { margin-left: 4px; }
/* Kanban View */
.kanban {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  min-height: 400px;
}
.kanban-col {
  background: var(--surface);
  border-radius: 8px;
  padding: 12px;
  border: 1px solid var(--border);
}
.kanban-col h3 {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: .5px;
  color: var(--text2);
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.kanban-col h3 .count {
  font-size: 11px;
  color: var(--text2);
  background: var(--surface2);
  padding: 1px 7px;
  border-radius: 8px;
}
.kanban-card {
  background: var(--surface2);
  border-radius: 6px;
  padding: 10px 12px;
  margin-bottom: 8px;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: border-color .15s;
}
.kanban-card:hover { border-color: var(--accent); }
.kanban-card .card-title { font-size: 13px; font-weight: 500; margin-bottom: 4px; }
.kanban-card .card-meta { font-size: 11px; color: var(--text2); }
.kanban-card .card-meta span { margin-right: 6px; }
.kanban-card .card-actions { margin-top: 6px; display: flex; gap: 4px; }
.kanban-card .card-actions select {
  font-size: 11px;
  padding: 2px 6px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
}
/* Modal */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.8);
  z-index: 200;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border-radius: 12px;
  border: 1px solid var(--border);
  width: 100%;
  max-width: 700px;
  max-height: 90vh;
  overflow-y: auto;
  padding: 24px;
}
.modal h2 { font-size: 18px; margin-bottom: 20px; }
.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.form-grid .full { grid-column: 1 / -1; }
.form-group { display: flex; flex-direction: column; gap: 4px; }
.form-group label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: .4px; }
.form-group input, .form-group select, .form-group textarea {
  padding: 8px 10px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font-size: 13px;
  font-family: inherit;
}
.form-group textarea { resize: vertical; min-height: 60px; }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  outline: none;
  border-color: var(--accent);
}
.modal-actions {
  margin-top: 20px;
  display: flex;
  gap: 8px;
  justify-content: flex-end;
}
/* Empty state */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text2);
}
.empty-state p { font-size: 16px; margin-bottom: 8px; }
/* Responsive */
@media (max-width: 900px) {
  .kanban { grid-template-columns: 1fr 1fr; }
  .form-grid { grid-template-columns: 1fr; }
  .form-grid .full { grid-column: 1; }
}
@media (max-width: 600px) {
  .kanban { grid-template-columns: 1fr; }
  .header { flex-direction: column; gap: 8px; align-items: flex-start; }
  .toolbar { flex-direction: column; }
  .toolbar .spacer { display: none; }
}
</style>
</head>

</div>

<div class="content" id="contentArea">

</div>

<div class="modal-overlay" id="modalOverlay">

    <div class="form-grid">
      <div class="form-group full"><label>Title</label><input id="f-title"></div>
      <div class="form-group"><label>Week</label>
        <select id="f-week">

        </select>
      </div>
      <div class="form-group"><label>Day</label><input id="f-day" placeholder="Mon Jun 8"></div>
      <div class="form-group"><label>Theme</label>

          <option>Menu Monday</option><option>Vibe Tuesday</option><option>Catering Wednesday</option>
          <option>Taste of Kigali</option><option>Weekend Ready</option><option>Saturday Vibes</option>
          <option>Sunday Slow Down</option>
        </select>
      </div>
      <div class="form-group"><label>Type</label>
        <select id="f-type">
          <option>Feed Carousel</option><option>Feed Single</option><option>Reel</option><option>Story</option>

      </div>
      <div class="form-group"><label>Status</label>
        <select id="f-status">
          <option>Idea</option><option>Draft</option><option>Scheduled</option><option>Posted</option><option>Archived</option>
        </select>
      </div>
      <div class="form-group"><label>Scheduled Date</label><input id="f-schedDate" type="date"></div>
      <div class="form-group"><label>Posted Date</label><input id="f-postedDate" type="date"></div>
      <div class="form-group full"><label>Images (comma-separated)</label><input id="f-images" placeholder="beef-fillet.jpg, beef-brochette.jpg"></div>
      <div class="form-group"><label>Audio (Reels)</label><input id="f-audio" placeholder="Trending Afrobeat"></div>
      <div class="form-group"><label>Text Overlay (Reels)</label><input id="f-overlay" placeholder='"Beef Fillet — 12,000 RWF"'></div>
      <div class="form-group full"><label>Caption</label><textarea id="f-caption" rows="4"></textarea></div>
      <div class="form-group full"><label>Hashtags</label><input id="f-hashtags" placeholder="#KigaliFood #KigaliEats"></div>
      <div class="form-group full"><label>CTA</label><input id="f-cta" placeholder="Book your table — link in bio"></div>
      <div class="form-group"><label>Likes</label><input id="f-likes" type="number" value="0"></div>
      <div class="form-group"><label>Comments</label><input id="f-comments" type="number" value="0"></div>
      <div class="form-group"><label>Views</label><input id="f-views" type="number" value="0"></div>
      <div class="form-group"><label>Saves</label><input id="f-saves" type="number" value="0"></div>
      <div class="form-group full"><label>Notes</label><textarea id="f-notes" rows="2"></textarea></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-danger" id="deleteBtn" style="display:none" onclick="deletePost()">Delete</button>
      <button class="btn btn-primary" onclick="savePost()">Save</button>
    </div>
  </div>
</div>

// ===== STATE =====
let data = [];
let editingId = null;
let currentView = 'table';
let sortCol = 'day';
let sortDir = 'asc';

// ===== INIT =====
function init() {
  const saved = localStorage.getItem('tania_instagram_crm');
  data = saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(SEED));
  applyFilters();
}

function saveData() {
  localStorage.setItem('tania_instagram_crm', JSON.stringify(data));
}

// ===== UUID =====
function uuid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

// ===== RENDER =====
function renderStats() {
  const total = data.length;
  const draft = data.filter(p => p.status === 'Draft').length;
  const scheduled = data.filter(p => p.status === 'Scheduled').length;
  const posted = data.filter(p => p.status === 'Posted').length;
  const idea = data.filter(p => p.status === 'Idea').length;
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-card gray"><div class="num">${total}</div><div class="label">Total</div></div>
    <div class="stat-card blue"><div class="num">${idea}</div><div class="label">Idea</div></div>
    <div class="stat-card blue"><div class="num">${draft}</div><div class="label">Draft</div></div>
    <div class="stat-card gold"><div class="num">${scheduled}</div><div class="label">Scheduled</div></div>
    <div class="stat-card green"><div class="num">${posted}</div><div class="label">Posted</div></div>
  `;
}

function render() {
  renderStats();
  const area = document.getElementById('contentArea');
  const filtered = getFilteredData();
  if (filtered.length === 0) {
    area.innerHTML = '<div class="empty-state"><p>No posts match your filters</p><button class="btn" onclick="clearFilters()">Clear filters</button></div>';
    return;
  }
  if (currentView === 'table') renderTable(filtered, area);
  else renderKanban(filtered, area);
}

function renderTable(items, area) {
  const sortIcon = (col) => sortCol === col ? (sortDir === 'asc' ? '▲' : '▼') : '';
  let html = `<table><thead><tr>
    <th onclick="setSort('day')">Date ${sortIcon('day')}</th>
    <th onclick="setSort('theme')">Theme ${sortIcon('theme')}</th>
    <th onclick="setSort('type')">Type ${sortIcon('type')}</th>
    <th onclick="setSort('status')">Status ${sortIcon('status')}</th>
    <th onclick="setSort('title')">Caption ${sortIcon('title')}</th>
    <th>Hashtags</th>
    <th>Actions</th>
  </tr></thead><tbody>`;
  items.forEach(p => {
    const capPreview = p.caption ? p.caption.replace(/\n/g, ' ').substring(0, 60) + '...' : '';
    const tagPreview = p.hashtags ? p.hashtags.substring(0, 40) + '...' : '';
    html += `<tr onclick="openModal('${p.id}')">
      <td>${p.day || p.scheduledDate || ''}</td>
      <td>${p.theme}</td>
      <td><span class="type-badge">${p.type}</span></td>
      <td><span class="status-badge status-${p.status}">${p.status}</span></td>
      <td class="caption-preview">${escHtml(capPreview)}</td>
      <td style="color:var(--text2);font-size:11px;">${escHtml(tagPreview)}</td>
      <td class="actions-cell" onclick="event.stopPropagation()">
        <button class="btn btn-sm btn-ghost" onclick="openModal('${p.id}')">Edit</button>
        <button class="btn btn-sm btn-ghost" style="color:var(--red)" onclick="deletePost('${p.id}')">Del</button>
      </td>
    </tr>`;
  });
  html += '</tbody></table>';
  area.innerHTML = html;
}

function renderKanban(items, area) {
  const cols = ['Idea', 'Draft', 'Scheduled', 'Posted'];
  let html = '<div class="kanban">';
  cols.forEach(status => {
    const cards = items.filter(p => p.status === status);
    html += `<div class="kanban-col"><h3>${status} <span class="count">${cards.length}</span></h3>`;
    cards.forEach(p => {
      html += `<div class="kanban-card" onclick="openModal('${p.id}')">
        <div class="card-title">${escHtml(p.title)}</div>
        <div class="card-meta">
          <span>${p.day || ''}</span>
          <span class="type-badge">${p.type}</span>
        </div>
        <div class="card-actions" onclick="event.stopPropagation()">
          <select onchange="quickStatus('${p.id}', this.value)">
            ${cols.map(s => `<option value="${s}" ${s === p.status ? 'selected' : ''}>${s}</option>`).join('')}
            <option value="Archived">Archived</option>
          </select>
        </div>
      </div>`;
    });
    html += '</div>';
  });
  html += '</div>';
  area.innerHTML = html;
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ===== FILTERS =====
function getFilteredData() {
  const status = document.getElementById('filterStatus').value;
  const type = document.getElementById('filterType').value;
  const theme = document.getElementById('filterTheme').value;
  const week = document.getElementById('filterWeek').value;
  const search = document.getElementById('searchInput').value.toLowerCase();
  let items = [...data];
  if (status) items = items.filter(p => p.status === status);
  if (type) items = items.filter(p => p.type === type);
  if (theme) items = items.filter(p => p.theme === theme);
  if (week) items = items.filter(p => p.week === week);
  if (search) items = items.filter(p => (p.title + ' ' + p.caption).toLowerCase().includes(search));
  // Sort
  items.sort((a, b) => {
    let va = (a[sortCol] || '').toLowerCase();
    let vb = (b[sortCol] || '').toLowerCase();
    if (sortCol === 'scheduledDate') { va = a.scheduledDate || ''; vb = b.scheduledDate || ''; }
    return sortDir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
  });
  return items;
}

function applyFilters() { render(); }
function clearFilters() {
  document.querySelectorAll('.toolbar select').forEach(s => s.value = '');
  document.getElementById('searchInput').value = '';
  applyFilters();
}

function setSort(col) {
  if (sortCol === col) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
  else { sortCol = col; sortDir = 'asc'; }
  render();
}

function switchView(view) {
  currentView = view;
  document.getElementById('viewTable').className = view === 'table' ? 'active' : '';
  document.getElementById('viewKanban').className = view === 'kanban' ? 'active' : '';
  render();
}

// ===== MODAL =====
function openModal(id) {
  editingId = id || null;
  document.getElementById('modalTitle').textContent = id ? 'Edit Post' : 'New Post';
  document.getElementById('deleteBtn').style.display = id ? 'inline-block' : 'none';
  const p = id ? data.find(d => d.id === id) : null;
  document.getElementById('f-title').value = p ? p.title : '';
  document.getElementById('f-week').value = p ? p.week : 'Week 1';
  document.getElementById('f-day').value = p ? p.day : '';
  document.getElementById('f-theme').value = p ? p.theme : 'Menu Monday';
  document.getElementById('f-type').value = p ? p.type : 'Feed Carousel';
  document.getElementById('f-status').value = p ? p.status : 'Idea';
  document.getElementById('f-schedDate').value = p ? p.scheduledDate : '';
  document.getElementById('f-postedDate').value = p ? p.postedDate : '';
  document.getElementById('f-images').value = p ? p.images : '';
  document.getElementById('f-audio').value = p ? p.audio : '';
  document.getElementById('f-overlay').value = p ? p.textOverlay : '';
  document.getElementById('f-caption').value = p ? p.caption : '';
  document.getElementById('f-hashtags').value = p ? p.hashtags : '';
  document.getElementById('f-cta').value = p ? p.cta : '';
  document.getElementById('f-likes').value = p ? p.likes : 0;
  document.getElementById('f-comments').value = p ? p.comments : 0;
  document.getElementById('f-views').value = p ? p.views : 0;
  document.getElementById('f-saves').value = p ? p.saves : 0;
  document.getElementById('f-notes').value = p ? p.notes : '';
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  editingId = null;
}

function savePost() {
  const obj = {
    id: editingId || uuid(),
    title: document.getElementById('f-title').value,
    week: document.getElementById('f-week').value,
    day: document.getElementById('f-day').value,
    theme: document.getElementById('f-theme').value,
    type: document.getElementById('f-type').value,
    status: document.getElementById('f-status').value,
    scheduledDate: document.getElementById('f-schedDate').value,
    postedDate: document.getElementById('f-postedDate').value,
    images: document.getElementById('f-images').value,
    audio: document.getElementById('f-audio').value,
    textOverlay: document.getElementById('f-overlay').value,
    caption: document.getElementById('f-caption').value,
    hashtags: document.getElementById('f-hashtags').value,
    cta: document.getElementById('f-cta').value,
    likes: parseInt(document.getElementById('f-likes').value) || 0,
    comments: parseInt(document.getElementById('f-comments').value) || 0,
    views: parseInt(document.getElementById('f-views').value) || 0,
    saves: parseInt(document.getElementById('f-saves').value) || 0,
    notes: document.getElementById('f-notes').value
  };
  if (!obj.title) { alert('Title is required'); return; }
  if (editingId) {
    const idx = data.findIndex(d => d.id === editingId);
    if (idx >= 0) data[idx] = obj;
  } else {
    data.push(obj);
  }
  saveData();
  closeModal();
  render();
}

function deletePost(id) {
  const targetId = id || editingId;
  if (!confirm('Delete this post?')) return;
  data = data.filter(d => d.id !== targetId);
  saveData();
  closeModal();
  render();
}

function quickStatus(id, status) {
  const p = data.find(d => d.id === id);
  if (p) { p.status = status; saveData(); render(); }
}

// ===== EXPORT =====
function exportJSON() {
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `tania-instagram-crm-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

// ===== START =====
document.addEventListener('DOMContentLoaded', init);
</script>
